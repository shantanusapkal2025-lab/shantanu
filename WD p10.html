<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Embedding Demonstration</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        color: #2c3e50;
      }
      .iframe-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        width: 100%;
        max-width: 1200px;
        margin-top: 20px;
      }
      .embed-card {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 15px;
        flex: 1 1 400px; /* Allows cards to shrink and grow, minimum 400px wide */
        display: flex;
        flex-direction: column;
      }
      .embed-card h2 {
        margin-top: 0;
        font-size: 1.2rem;
        color: #34495e;
        border-bottom: 2px solid #ecf0f1;
        padding-bottom: 10px;
      }
      iframe {
        width: 100%;
        height: 400px;
        border: none; /* Removes the ugly default browser border */
        border-radius: 4px;
        background-color: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <h1>HTML Iframe Demonstration</h1>
    <p>
      Using modern HTML5 <code>&lt;iframe&gt;</code> tags to embed external
      content cleanly.
    </p>
    <div class="iframe-container">
      <div class="embed-card">
        <h2>External Webpage (Example.com)</h2>
        <iframe
          src="https://example.com"
          title="Example Domain Webpage"
          loading="lazy"
        >
        </iframe>
      </div>
      <div class="embed-card">
        <h2>Interactive Google Map (Eiffel Tower)</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9914406082105!2d2.292292615674389!3d48.85837360866268!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca9ee380ef7e0!2sEiffel%20Tower!5e0!3m2!1sen!2sus!4v1675101340476!5m2!1sen!2sus"
          title="Google Map of the Eiffel Tower"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
      </div>
    </div>
  </body>
</html>
